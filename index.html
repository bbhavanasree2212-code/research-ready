<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RepoReady - Research Software Readiness Assessment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="logo">RepoReady</h1>
            <div class="badge">
                <span>LIVE ASSESSMENT</span>
                <span>V1.0.0</span>
            </div>
            <p class="tagline">Is your software research-ready?</p>
        </div>

        <div class="assessment-card-main">
            <div class="card-content">
                <p class="input-label">ENTER A PUBLIC GITHUB URL TO BEGIN ASSESSMENT</p>
                
                <div class="url-input-group">
                    <div class="url-prefix">https://github.com/</div>
                    <input type="text" id="repoInput" class="repo-input" placeholder="owner/repo">
                    <button id="assessBtn" class="assess-btn">ASSESS →</button>
                </div>
                
                <div class="demo-section">
                    <p class="demo-label">TRY THESE:</p>
                    <div class="demo-buttons">
                        <button id="loadLastBtn" class="demo-btn">Load Last Assessment</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Analyzing repository structure and best practices...</p>
            <p class="loading-subtitle">This may take a few seconds</p>
        </div>

        <div id="result" class="result-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
